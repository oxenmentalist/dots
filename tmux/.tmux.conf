# Prefix: Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-position bottom

# 24-bit color
set -as terminal-features ",*:RGB"

# Slightly taller status bar
set -g status 2

# Splits: preserve the current working directory
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows also preserve the current directory
bind c new-window -c "#{pane_current_path}"

# Resize panes with prefix + Shift-H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config with Ctrl-a r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# vim-tmux-navigator integration
# Ctrl-h/j/k/l works without the tmux prefix.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Avoid delay when switching modes or leaving Neovim insert mode
set -sg escape-time 10

##### Kanagawa Wave #####

# Background
set -g status-style "bg=#16161D,fg=#DCD7BA"

# Left
set -g status-left-length 40
set -g status-left "#[fg=#7E9CD8,bold] #S #[default]"

# Right
set -g status-right-length 80
set -g status-right "#[fg=#727169]%Y-%m-%d #[fg=#7E9CD8]%H:%M "

# Windows
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#727169,bg=#16161D"

setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "fg=#16161D,bg=#7E9CD8,bold"

# Activity / Bell
setw -g window-status-activity-style "fg=#98BB6C,bold"
setw -g window-status-bell-style "fg=#C34043,bold"

# Pane borders
set -g pane-border-style "fg=#2A2A37"
set -g pane-active-border-style "fg=#7E9CD8"

# Messages
set -g message-style "bg=#223249,fg=#DCD7BA"

# Mode (copy mode)
set -g mode-style "bg=#2D4F67,fg=#DCD7BA"

